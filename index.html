<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Play Games</title>

<style>
body{
    margin:0;
    background:#111;
    color:white;
    font-family:Arial,sans-serif;
    text-align:center;
}

#startPage{
    height:100vh;
    display:flex;
    flex-direction:column;
    justify-content:center;
    align-items:center;
}

#cameraPage{
    display:none;
}

#video{
    width:100vw;
    height:100vh;
    object-fit:cover;
}

.blur{
    filter:blur(18px);
}

button{
    padding:15px 30px;
    font-size:22px;
    border:none;
    border-radius:10px;
    cursor:pointer;
}

#status{
    position:fixed;
    top:15px;
    left:50%;
    transform:translateX(-50%);
    background:rgba(0,0,0,.6);
    padding:10px 20px;
    border-radius:10px;
    z-index:999;
}
</style>

<script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js"></script>
</head>

<body>

<div id="startPage">
    <h1>🎮 Play Games</h1>
    <button id="playBtn">Start</button>
</div>

<div id="cameraPage">
    <video id="video" autoplay playsinline muted></video>
    <div id="status">Menunggu tangan...</div>
</div>

<script>

const playBtn=document.getElementById("playBtn");
const video=document.getElementById("video");
const status=document.getElementById("status");

playBtn.onclick=async()=>{

    document.getElementById("startPage").style.display="none";
    document.getElementById("cameraPage").style.display="block";

    try{

        const stream=await navigator.mediaDevices.getUserMedia({
            video:{
                facingMode:"user"
            }
        });

        video.srcObject=stream;

        startTracking();

    }catch(err){

        alert("Izin kamera ditolak");

    }
};

function fingerUp(tip,pip){
    return tip.y < pip.y;
}

function isPeace(hand){

    const indexUp =
        fingerUp(hand[8],hand[6]);

    const middleUp =
        fingerUp(hand[12],hand[10]);

    const ringUp =
        fingerUp(hand[16],hand[14]);

    const pinkyUp =
        fingerUp(hand[20],hand[18]);

    const distance =
        Math.abs(hand[8].x - hand[12].x);

    return (
        indexUp &&
        middleUp &&
        !ringUp &&
        !pinkyUp &&
        distance > 0.05
    );
}

function startTracking(){

    const hands=new Hands({

        locateFile:(file)=>{
            return `https://cdn.jsdelivr.net/npm/@mediapipe/hands/${file}`;
        }

    });

    hands.setOptions({

        maxNumHands:1,
        modelComplexity:1,
        minDetectionConfidence:0.5,
        minTrackingConfidence:0.5

    });

    hands.onResults((results)=>{

        let peace=false;

        if(results.multiHandLandmarks){

            for(const hand of results.multiHandLandmarks){

                if(isPeace(hand)){
                    peace=true;
                }

            }

        }

        if(peace){

            video.classList.add("blur");
            status.innerHTML="✌️ Terdeteksi - Blur Aktif";

        }else{

            video.classList.remove("blur");
            status.innerHTML="📷 Normal";

        }

    });

    const camera=new Camera(video,{

        onFrame:async()=>{

            await hands.send({
                image:video
            });

        },

        width:640,
        height:480

    });

    camera.start();

}

</script>

</body>
</html>
