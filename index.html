<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Play Games</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    background:#111;
    overflow:hidden;
    font-family:Arial,sans-serif;
}

#startPage{
    position:fixed;
    inset:0;
    display:flex;
    flex-direction:column;
    justify-content:center;
    align-items:center;
    background:#111;
    color:white;
    z-index:100;
}

#startBtn{
    padding:15px 40px;
    font-size:24px;
    border:none;
    border-radius:12px;
    cursor:pointer;
}

#cameraPage{
    display:none;
}

#video{
    width:100vw;
    height:100vh;
    object-fit:cover;
}

.blur{
    filter:blur(18px);
}

.cat{
    position:fixed;
    font-size:55px;
    z-index:20;
    user-select:none;
}

.top-left{
    top:15px;
    left:15px;
}

.top-right{
    top:15px;
    right:15px;
}

.bottom-left{
    bottom:15px;
    left:15px;
}

.bottom-right{
    bottom:15px;
    right:15px;
}

.controls{
    position:fixed;
    top:50%;
    left:50%;
    transform:translateX(-50%);
    z-index:30;
    background:rgba(0,0,0,.5);
    padding:10px;
    border-radius:12px;
}

.controls button{
    padding:10px 20px;
    margin:5px;
    cursor:pointer;
}

.controls input{
    color:white;
}

</style>

<script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js"></script>

</head>
<body>

<div id="startPage">
    <h1 style="margin-bottom:20px;">🎮 Play Games</h1>
    <button id="startBtn">Start</button>
</div>

<div id="cameraPage">

    <video id="video" autoplay playsinline muted></video>

    <div class="cat top-left">🐱</div>
    <div class="cat top-right">🐱</div>
    <div class="cat bottom-left">🐱</div>
    <div class="cat bottom-right">🐱</div>

    <div class="controls">

        <input type="file"
               id="audioFile"
               accept="audio/*">

        <button id="playMusic">
            ▶ Play
        </button>

        <button id="pauseMusic">
            ⏸ Pause
        </button>

    </div>

</div>

<audio id="bgm"></audio>

<script>

const startBtn = document.getElementById("startBtn");
const video = document.getElementById("video");
const bgm = document.getElementById("bgm");

const audioFile =
document.getElementById("audioFile");

audioFile.addEventListener("change",()=>{

    const file = audioFile.files[0];

    if(file){

        bgm.src =
        URL.createObjectURL(file);

    }

});

document.getElementById("playMusic")
.addEventListener("click",()=>{

    bgm.play();

});

document.getElementById("pauseMusic")
.addEventListener("click",()=>{

    bgm.pause();

});

startBtn.onclick = async()=>{

    document.getElementById("startPage")
    .style.display="none";

    document.getElementById("cameraPage")
    .style.display="block";

    try{

        const stream =
        await navigator.mediaDevices
        .getUserMedia({

            video:{
                facingMode:"user"
            }

        });

        video.srcObject = stream;

        startTracking();

    }catch(e){

        alert("Izin kamera ditolak");

    }

};

function fingerUp(tip,pip){

    return tip.y < pip.y;

}

function isPeace(hand){

    const indexUp =
    fingerUp(hand[8],hand[6]);

    const middleUp =
    fingerUp(hand[12],hand[10]);

    const ringUp =
    fingerUp(hand[16],hand[14]);

    const pinkyUp =
    fingerUp(hand[20],hand[18]);

    const gap =
    Math.abs(hand[8].x-hand[12].x);

    return (
        indexUp &&
        middleUp &&
        !ringUp &&
        !pinkyUp &&
        gap > 0.05
    );

}

function startTracking(){

    const hands =
    new Hands({

        locateFile:(file)=>{

            return `https://cdn.jsdelivr.net/npm/@mediapipe/hands/${file}`;

        }

    });

    hands.setOptions({

        maxNumHands:1,
        modelComplexity:1,
        minDetectionConfidence:0.5,
        minTrackingConfidence:0.5

    });

    hands.onResults((results)=>{

        let blur=false;

        if(results.multiHandLandmarks){

            for(const hand of results.multiHandLandmarks){

                if(isPeace(hand)){

                    blur=true;

                }

            }

        }

        if(blur){

            video.classList.add("blur");

        }else{

            video.classList.remove("blur");

        }

    });

    const camera =
    new Camera(video,{

        onFrame:async()=>{

            await hands.send({
                image:video
            });

        },

        width:640,
        height:480

    });

    camera.start();

}

</script>

</body>
</html>
